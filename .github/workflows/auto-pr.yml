name: Auto-merge to main

on:
  push:
    branches:
      - claude/happy-hellman-v2

jobs:
  merge-to-main:
    name: Merge → main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into main and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin claude/happy-hellman-v2

          # Fast-forward merge if possible, otherwise create a merge commit
          git merge --no-edit origin/claude/happy-hellman-v2

          git push origin main
          echo "✓ main updated"
