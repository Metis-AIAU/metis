name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
    paths:
      - 'threat-modeler/**'
      - '.github/workflows/deploy-cloud-run.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: australia-southeast1          # change to your preferred region
  SERVICE: metis-threat-modeler
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/metis-threat-modeler

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Auth to GCP (Workload Identity — no long-lived key needed) ─────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Configure Docker to push to GCR / Artifact Registry ───────────────
      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      # ── Build image from threat-modeler/ subdirectory ─────────────────────
      - name: Build Docker image
        working-directory: threat-modeler
        run: |
          docker build \
            --tag "$IMAGE:$GITHUB_SHA" \
            --tag "$IMAGE:latest" \
            .

      # ── Push to Google Container Registry ─────────────────────────────────
      - name: Push Docker image
        run: |
          docker push "$IMAGE:$GITHUB_SHA"
          docker push "$IMAGE:latest"

      # ── Deploy to Cloud Run ────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:$GITHUB_SHA" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-secrets "ANTHROPIC_API_KEY=anthropic-api-key:latest,JWT_SECRET=jwt-secret:latest" \
            --set-env-vars "NODE_ENV=production" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --format "value(status.url)"
