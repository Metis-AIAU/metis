steps:
  # ── Step 1: Fetch Firebase build-time secrets from Secret Manager ─────────
  # VITE_* vars are compiled into the JS bundle by Vite — they must be
  # available before `docker build`, not at container runtime.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: fetch-secrets
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p /workspace/secrets
        gcloud secrets versions access latest --secret=VITE_FIREBASE_API_KEY \
          --project=$PROJECT_ID > /workspace/secrets/VITE_FIREBASE_API_KEY
        gcloud secrets versions access latest --secret=VITE_FIREBASE_AUTH_DOMAIN \
          --project=$PROJECT_ID > /workspace/secrets/VITE_FIREBASE_AUTH_DOMAIN
        gcloud secrets versions access latest --secret=VITE_FIREBASE_PROJECT_ID \
          --project=$PROJECT_ID > /workspace/secrets/VITE_FIREBASE_PROJECT_ID
        gcloud secrets versions access latest --secret=VITE_FIREBASE_STORAGE_BUCKET \
          --project=$PROJECT_ID > /workspace/secrets/VITE_FIREBASE_STORAGE_BUCKET
        gcloud secrets versions access latest --secret=VITE_FIREBASE_MESSAGING_SENDER_ID \
          --project=$PROJECT_ID > /workspace/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID
        gcloud secrets versions access latest --secret=VITE_FIREBASE_APP_ID \
          --project=$PROJECT_ID > /workspace/secrets/VITE_FIREBASE_APP_ID
        gcloud secrets versions access latest --secret=VITE_FIREBASE_MEASUREMENT_ID \
          --project=$PROJECT_ID > /workspace/secrets/VITE_FIREBASE_MEASUREMENT_ID
        echo "✓ All secrets fetched"

  # ── Step 2: Build Docker image ────────────────────────────────────────────
  # Dockerfile lives in threat-modeler/; build context is that subdirectory.
  # Firebase config is passed as --build-arg and compiled into the React bundle.
  # The builder stage is discarded — secrets never persist in the final image.
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg VITE_FIREBASE_API_KEY="$(cat /workspace/secrets/VITE_FIREBASE_API_KEY)" \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN="$(cat /workspace/secrets/VITE_FIREBASE_AUTH_DOMAIN)" \
          --build-arg VITE_FIREBASE_PROJECT_ID="$(cat /workspace/secrets/VITE_FIREBASE_PROJECT_ID)" \
          --build-arg VITE_FIREBASE_STORAGE_BUCKET="$(cat /workspace/secrets/VITE_FIREBASE_STORAGE_BUCKET)" \
          --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="$(cat /workspace/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID)" \
          --build-arg VITE_FIREBASE_APP_ID="$(cat /workspace/secrets/VITE_FIREBASE_APP_ID)" \
          --build-arg VITE_FIREBASE_MEASUREMENT_ID="$(cat /workspace/secrets/VITE_FIREBASE_MEASUREMENT_ID)" \
          --tag gcr.io/$PROJECT_ID/metis-threat-modeler:$COMMIT_SHA \
          --tag gcr.io/$PROJECT_ID/metis-threat-modeler:latest \
          --file threat-modeler/Dockerfile \
          threat-modeler

  # ── Step 3: Push image to Container Registry ──────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/metis-threat-modeler

  # ── Step 4: Deploy to Cloud Run ───────────────────────────────────────────
  # Runtime secrets (ANTHROPIC_API_KEY, JWT_SECRET) are injected by Cloud Run
  # from Secret Manager — they are never in the image or build logs.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - metis-threat-modeler
      - --image=gcr.io/$PROJECT_ID/metis-threat-modeler:$COMMIT_SHA
      - --region=australia-southeast1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=ANTHROPIC_API_KEY=APIkeyclaude:latest,JWT_SECRET=jwt-secret:latest
      - --set-env-vars=NODE_ENV=production
      - --quiet

images:
  - gcr.io/$PROJECT_ID/metis-threat-modeler:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/metis-threat-modeler:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # faster builds
