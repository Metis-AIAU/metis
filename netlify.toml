[build]
  base    = "threat-modeler"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Firebase config is set via Netlify Environment Variables in the dashboard
# (Site settings → Environment variables) — never hardcode here

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
